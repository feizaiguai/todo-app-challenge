<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 豪华待办事项 — AI In Action Challenge</title>
    <meta name="description" content="功能丰富的待办事项应用，支持分类、优先级、搜索、统计和本地存储">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b14;
            color: #e0e0f0;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(244, 63, 94, 0.06) 0%, transparent 50%);
            z-index: 0;
        }
        .app { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }
        header { text-align: center; margin-bottom: 2rem; }
        header h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #f472b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p { color: rgba(255,255,255,0.3); font-size: 0.85rem; margin-top: 0.3rem; }

        /* 统计卡片 */
        .stats { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; }
        .stat-card {
            flex: 1; padding: 1rem; border-radius: 14px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .stat-num { font-size: 1.8rem; font-weight: 700; }
        .stat-num.purple { color: #818cf8; }
        .stat-num.green { color: #34d399; }
        .stat-num.amber { color: #fbbf24; }
        .stat-label { font-size: 0.65rem; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.2rem; }

        /* 输入区 */
        .input-area {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem;
        }
        .input-row { display: flex; gap: 0.6rem; margin-bottom: 0.8rem; }
        .input-row input[type="text"] {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 0.7rem 1rem; color: #e0e0f0; font-family: 'Inter', sans-serif;
            font-size: 0.9rem; outline: none; transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: rgba(129, 140, 248, 0.5); }
        .add-btn {
            padding: 0.7rem 1.5rem; border-radius: 10px; border: none;
            background: linear-gradient(135deg, #818cf8, #a78bfa); color: #fff;
            font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; font-size: 0.9rem;
            transition: all 0.2s;
        }
        .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(129, 140, 248, 0.3); }
        .meta-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }
        .meta-row select {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; padding: 0.4rem 0.8rem; color: #e0e0f0;
            font-family: 'Inter', sans-serif; font-size: 0.8rem; outline: none;
        }

        /* 筛选/搜索 */
        .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
        .filter-btn {
            padding: 0.4rem 1rem; border-radius: 100px; border: 1px solid rgba(255,255,255,0.08);
            background: transparent; color: rgba(255,255,255,0.4); font-family: 'Inter', sans-serif;
            font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
        }
        .filter-btn.active { background: rgba(129, 140, 248, 0.15); color: #818cf8; border-color: rgba(129, 140, 248, 0.3); }
        .search-input {
            margin-left: auto; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 100px; padding: 0.4rem 1rem; color: #e0e0f0; font-family: 'Inter', sans-serif;
            font-size: 0.8rem; width: 180px; outline: none;
        }

        /* 任务列表 */
        .task-list { list-style: none; }
        .task-item {
            display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1rem;
            border-radius: 12px; margin-bottom: 0.5rem; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04); transition: all 0.2s; position: relative;
        }
        .task-item:hover { background: rgba(255,255,255,0.06); }
        .task-item.done { opacity: 0.45; }
        .task-item.done .task-text { text-decoration: line-through; }

        .task-check {
            width: 22px; height: 22px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.15);
            background: transparent; cursor: pointer; flex-shrink: 0; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: transparent;
        }
        .task-check.checked { background: #818cf8; border-color: #818cf8; color: #fff; }

        .task-content { flex: 1; min-width: 0; }
        .task-text { font-size: 0.9rem; word-break: break-word; }
        .task-meta { display: flex; gap: 0.5rem; margin-top: 0.3rem; }
        .task-tag {
            font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 100px;
            background: rgba(129, 140, 248, 0.1); color: #818cf8;
        }
        .task-tag.high { background: rgba(244, 63, 94, 0.1); color: #fb7185; }
        .task-tag.medium { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
        .task-tag.low { background: rgba(52, 211, 153, 0.1); color: #34d399; }

        .task-del {
            background: none; border: none; color: rgba(255,255,255,0.15); cursor: pointer;
            font-size: 1.1rem; padding: 0.3rem; transition: color 0.2s;
        }
        .task-del:hover { color: #f43f5e; }

        .empty { text-align: center; padding: 3rem; color: rgba(255,255,255,0.15); font-size: 0.9rem; }

        .footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: rgba(255,255,255,0.15); }
        .footer a { color: #818cf8; text-decoration: none; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .task-item { animation: slideIn 0.25s ease; }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>📝 豪华待办事项</h1>
            <p>管理你的任务，追踪你的效率</p>
        </header>

        <div class="stats">
            <div class="stat-card"><div class="stat-num purple" id="statTotal">0</div><div class="stat-label">总任务</div></div>
            <div class="stat-card"><div class="stat-num green" id="statDone">0</div><div class="stat-label">已完成</div></div>
            <div class="stat-card"><div class="stat-num amber" id="statPending">0</div><div class="stat-label">待完成</div></div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="添加新任务..." onkeydown="if(event.key==='Enter')addTask()">
                <button class="add-btn" onclick="addTask()">+ 添加</button>
            </div>
            <div class="meta-row">
                <select id="categorySelect">
                    <option value="general">📁 通用</option>
                    <option value="work">💼 工作</option>
                    <option value="personal">🏠 个人</option>
                    <option value="study">📚 学习</option>
                    <option value="health">💪 健康</option>
                </select>
                <select id="prioritySelect">
                    <option value="medium">🟡 中优先</option>
                    <option value="high">🔴 高优先</option>
                    <option value="low">🟢 低优先</option>
                </select>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="setFilter('all')">全部</button>
            <button class="filter-btn" onclick="setFilter('pending')">待完成</button>
            <button class="filter-btn" onclick="setFilter('done')">已完成</button>
            <input class="search-input" type="text" placeholder="🔍 搜索..." oninput="renderTasks()">
        </div>

        <ul class="task-list" id="taskList"></ul>

        <div class="footer">
            Made with 💜 by <a href="https://github.com/feizaiguai" target="_blank">Dao Agent</a>
            · AI In Action Challenge
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('luxTasks') || '[]');
        let filter = 'all';
        const CATS = { general:'📁', work:'💼', personal:'🏠', study:'📚', health:'💪' };

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;
            tasks.unshift({
                id: Date.now(),
                text,
                category: document.getElementById('categorySelect').value,
                priority: document.getElementById('prioritySelect').value,
                done: false,
                createdAt: new Date().toISOString(),
            });
            save();
            input.value = '';
            renderTasks();
        }

        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) t.done = !t.done;
            save();
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
            renderTasks();
        }

        function setFilter(f) {
            filter = f;
            document.querySelectorAll('.filter-btn').forEach((b, i) => {
                b.classList.toggle('active', ['all','pending','done'][i] === f);
            });
            renderTasks();
        }

        function renderTasks() {
            const search = document.querySelector('.search-input').value.toLowerCase();
            let filtered = tasks;
            if (filter === 'pending') filtered = filtered.filter(t => !t.done);
            if (filter === 'done') filtered = filtered.filter(t => t.done);
            if (search) filtered = filtered.filter(t => t.text.toLowerCase().includes(search));

            // 排序：未完成的按优先级排，已完成的沉底
            const priOrder = { high: 0, medium: 1, low: 2 };
            filtered.sort((a, b) => {
                if (a.done !== b.done) return a.done ? 1 : -1;
                return (priOrder[a.priority] || 1) - (priOrder[b.priority] || 1);
            });

            const list = document.getElementById('taskList');
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty">🎯 暂无任务，添加一个开始吧！</div>';
            } else {
                list.innerHTML = filtered.map(t => `
                    <li class="task-item ${t.done ? 'done' : ''}">
                        <button class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">✓</button>
                        <div class="task-content">
                            <div class="task-text">${escHtml(t.text)}</div>
                            <div class="task-meta">
                                <span class="task-tag">${CATS[t.category] || '📁'} ${t.category}</span>
                                <span class="task-tag ${t.priority}">${t.priority}</span>
                            </div>
                        </div>
                        <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
                    </li>
                `).join('');
            }

            // 更新统计
            document.getElementById('statTotal').textContent = tasks.length;
            document.getElementById('statDone').textContent = tasks.filter(t => t.done).length;
            document.getElementById('statPending').textContent = tasks.filter(t => !t.done).length;
        }

        function save() { localStorage.setItem('luxTasks', JSON.stringify(tasks)); }
        function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        renderTasks();
    </script>
</body>
</html>
